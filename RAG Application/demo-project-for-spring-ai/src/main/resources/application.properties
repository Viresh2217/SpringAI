spring.application.name=demo-project-for-spring-ai


#openai configuration

#spring.ai.openai.api-key=${OPENAI_API_KEY}

spring.ai.openai.cat.options.model=gpt-4.1
# Chat model (for generation)
#spring.ai.openai.embedding.model=llama-3.1-8b-instant
#spring.ai.openai.chat.options.temperature=0.7
# Embedding model (for vectorization in RAG)
#spring.ai.openai.embedding.model=llama-3.1-8b-instant


logging.level.org.springframework.ai.chat.client.advisor=DEBUG


# Ollama Base Configuration
spring.ai.ollama.base-url=http://localhost:11434

# Chat Model Configuration
spring.ai.ollama.chat.options.model=codellama

# Embedding Model Configuration
spring.ai.ollama.embedding.options.model=nomic-embed-text

# Auto-initialize the schema for storing vectors in MariaDB
spring.ai.vectorstore.jdbc.initialize-schema=true

#db configurations
#spring.datasource.url=jdbc:mysql://localhost:3306/spring_ai_db
spring.datasource.url=jdbc:mariadb://localhost:3308/springaidb
spring.datasource.username=root
spring.datasource.password=password


spring.ai.vectorstore.mariadb.initialize-schema=true
spring.ai.vectorstore.mariadb.distance-type=COSINE
spring.ai.vectorstore.mariadb.dimensions=768

#spring.ai.chat.memory.repository.jdbc.initialize-schema=ALWAYS